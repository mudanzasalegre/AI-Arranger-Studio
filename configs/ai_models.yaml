backends:
  mock_symbolic:
    enabled: true
    type: symbolic
    adapter: model_backends.symbolic.mock_backend.MockSymbolicBackend
    commercial_use: allowed
    dependency_mode: builtin
    tasks:
      - infill_bars
      - generate_track
      - continue_section
      - generate_variation
      - generate_full_sketch
      - plan_song
    capabilities:
      symbolic_midi: true
      multitrack: true
      bar_infill: true
      track_generation: true
      text_prompt: true
      json_planning: true
      token_output: true
      supports_training: false
      commercial_use: allowed

  midigpt:
    enabled: false
    type: symbolic
    adapter: model_backends.symbolic.midigpt_backend.MidiGptBackend
    model_name: yellow
    commercial_use: review_required
    dependency_mode: optional
    install_hint: pip install "midigpt[inference]"
    tasks:
      - infill_bars
      - generate_track
      - continue_section
    capabilities:
      symbolic_midi: true
      multitrack: true
      bar_infill: true
      track_generation: true
      text_prompt: false
      json_planning: false
      token_output: false
      supports_training: true
      commercial_use: review_required

  text2midi:
    enabled: false
    type: symbolic
    adapter: model_backends.symbolic.text2midi_backend.Text2MidiBackend
    commercial_use: review_required
    dependency_mode: optional
    execution_mode: worker_or_subprocess
    install_hint: install Text2MIDI in the optional model worker profile
    tasks:
      - generate_full_sketch
    capabilities:
      symbolic_midi: true
      multitrack: false
      bar_infill: false
      track_generation: false
      text_prompt: true
      json_planning: false
      token_output: false
      supports_training: true
      commercial_use: review_required

settings:
  forbid_audio_models: true
  artifact_quarantine_required: true
  require_take_acceptance: true
  default_max_ai_attempts: 3
  export_pending_takes: false
  artifact_raw_dir: outputs/model_artifacts/raw
