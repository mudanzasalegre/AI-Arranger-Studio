[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [
  "apps/api",
  "packages/arranger_core",
  "packages/dataset_tools",
  "packages/midi_models",
  "packages/model_backends",
]
